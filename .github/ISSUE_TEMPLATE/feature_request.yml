name: Feature request
description: Suggest an improvement to Codex delegation from Claude Code.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should become easier or more reliable?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the plugin do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Claude tool selection
        - Codex sessions
        - Parallel agents
        - Nested subagents
        - Logging or diagnostics
        - Installation
        - Testing
        - Documentation
        - Other
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Security, compatibility, performance, or UX constraints to preserve.
